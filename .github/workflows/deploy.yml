# 给这个工作流起个名字
name: my-test-lib

on:
  push:
    branches: [main, master]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      # v5 起基于 Node 24，消除 “Node.js 20 actions are deprecated” 警告
      - name: 拉取代码
        uses: actions/checkout@v5

      - name: 安装 Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          # 勿在此用 cache: yarn —— 文档要求 Yarn 已预装，裸 Ubuntu 无 yarn 会导致失败

      # 与本地 yarn.lock（Yarn 1）一致；运行器默认没有 yarn 命令
      - name: 安装 Yarn Classic
        run: npm install -g yarn@1.22.22

      - name: 安装依赖
        run: yarn install --frozen-lockfile

      - name: 构建项目
        run: yarn build

      - name: 部署到 GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
          token: ${{ secrets.GITHUB_TOKEN }}
