# 给这个工作流起个名字
name: my-test-lib

# 触发器：main / master 推送时执行（与仓库默认分支一致即可）
on:
  push:
    branches: [main, master]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn # 缓存 yarn，加速构建

      # 项目只有 yarn.lock、无 package-lock.json，不能用 npm ci（会报错退出）
      - name: 安装依赖
        run: yarn install --frozen-lockfile

      - name: 构建项目
        run: yarn build

      - name: 部署到 GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
          token: ${{ secrets.GITHUB_TOKEN }}
